<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="50%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
  </defs>
  <!-- 背景 -->
  <rect width="512" height="512" rx="100" fill="#0b0f19" />
  <!-- 時計盤とマインドマップの統合イメージ -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#grad)" stroke-width="16" opacity="0.3" />
  <circle cx="256" cy="256" r="120" fill="none" stroke="url(#grad)" stroke-width="12" stroke-dasharray="10 15" />
  
  <!-- コネクションエッジ -->
  <path d="M 256 256 L 160 180" stroke="url(#grad)" stroke-width="8" stroke-linecap="round" />
  <path d="M 256 256 L 360 220" stroke="url(#grad)" stroke-width="8" stroke-linecap="round" />
  <path d="M 256 256 L 220 370" stroke="url(#grad)" stroke-width="8" stroke-linecap="round" />
  
  <!-- ノード (中心) -->
  <circle cx="256" cy="256" r="32" fill="url(#grad)" />
  
  <!-- 子ノード -->
  <circle cx="160" cy="180" r="20" fill="#6366f1" />
  <circle cx="360" cy="220" r="24" fill="#a855f7" />
  <circle cx="220" cy="370" r="16" fill="#ec4899" />
</svg>
